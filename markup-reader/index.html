<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markup Reader</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <header class="toolbar">
        <button id="open-btn" class="toolbar-btn" title="Open File (Cmd+O)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
          </svg>
          <span>Open</span>
        </button>
        <button id="theme-btn" class="toolbar-btn" title="Toggle Theme (Cmd+Shift+D)">
          <svg id="theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg id="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </header>

      <main id="content" class="content">
        <div id="welcome" class="welcome">
          <h1>Markup Reader</h1>
          <p>Open a Markdown file to get started</p>
          <p class="shortcut-hint">or press <kbd>Cmd</kbd>+<kbd>O</kbd></p>
        </div>
        <article id="markdown-content" class="markdown-body" style="display:none"></article>
      </main>

      <footer id="status-bar" class="status-bar">
        <span id="file-info"></span>
        <span id="render-stats"></span>
      </footer>
    </div>

    <div id="error-overlay" class="error-overlay" style="display:none">
      <div class="error-dialog">
        <h2>Error</h2>
        <p id="error-message"></p>
        <button id="error-close" class="toolbar-btn">Dismiss</button>
      </div>
    </div>
  </body>
</html>
